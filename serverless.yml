service: my-awesome-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 128
  timeout: 30

  # ✅ ADD THIS (Main CORS FIX)
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:3000
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowCredentials: true

  environment:
    NODE_ENV: ${self:provider.stage}
    DB_HOST: ${env:DB_HOST, ''}
    DB_USER: ${env:DB_USER, ''}
    DB_PASSWORD: ${env:DB_PASSWORD, ''}
    DB_NAME: ${env:DB_NAME, ''}
    DB_PORT: ${env:DB_PORT, '3306'}

plugins:
  - serverless-plugin-typescript
  - serverless-offline

functions:
  hello:
    handler: src/handlers/hello.hello
    events:
      - httpApi:   # ✅ CHANGED from "http" → "httpApi"
          path: /hello
          method: GET

  dashboard: ${file(./resources/functions/dashboard.yml)}

custom:
  serverless-offline:
    httpPort: 3004
    host: 0.0.0.0

package:
  exclude:
    - .git/**
    - .gitignore
    - README.md
    - .env
    - node_modules/.cache/**
    - tsconfig.json
    - package-lock.json
    - pnpm-lock.yaml
    - .serverless/**
    - "*.md"
    - "*.log"
    - .DS_Store
    - .vscode/**
    - .idea/**
    - node_modules/@types/**
    - node_modules/typescript/**
    - node_modules/serverless/**
    - node_modules/serverless-offline/**
    - node_modules/serverless-plugin-typescript/**
  patterns:
    - '!node_modules/**'
    - 'node_modules/aws-lambda/**'